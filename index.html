<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshop Navigator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --deep: #1A1209;
    --cream: #FAF6EE;
    --warm: #F5EDD8;
    --muted: #8A7A5A;
    --border: rgba(201,168,76,0.25);
    --shadow: 0 8px 40px rgba(26,18,9,0.15);

    --c1: #2C5F8A; /* Group 1 - blue */
    --c2: #5A8A2C; /* Group 2 - green */
    --c3: #8A2C5A; /* Group 3 - rose */
    --c4: #8A5A2C; /* Group 4 - amber */
    --c5: #5A2C8A; /* Group 5 - violet */
    --c6: #2C8A7A; /* Group 6 - teal */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--deep);
    color: var(--cream);
    min-height: 100vh;
  }

  /* ── ADMIN / PRINT VIEW ── */
  #admin-view {
    padding: 40px 24px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .admin-header {
    text-align: center;
    margin-bottom: 56px;
  }

  .admin-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--gold);
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .admin-header p {
    color: var(--muted);
    font-size: 1rem;
    font-weight: 300;
  }

  .admin-header .divider {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto;
  }

  .qr-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 28px;
  }

  .qr-card {
    background: var(--warm);
    border-radius: 20px;
    overflow: hidden;
    color: var(--deep);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: transform 0.2s ease;
  }

  .qr-card:hover { transform: translateY(-4px); }

  .qr-card-header {
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }

  .group-badge {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 900;
    flex-shrink: 0;
  }

  .qr-card-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    color: var(--deep);
  }

  .qr-card-header small {
    font-size: 0.75rem;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }

  .qr-area {
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .qr-box {
    background: white;
    padding: 12px;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }

  .mini-links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .mini-link-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1.5px solid;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.15s ease;
    cursor: pointer;
    background: transparent;
  }

  .mini-link-btn:hover { opacity: 0.8; transform: translateX(3px); }

  .mini-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .print-btn {
    margin: 48px auto 0;
    display: block;
    background: var(--gold);
    color: var(--deep);
    border: none;
    padding: 14px 36px;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }

  .print-btn:hover { background: var(--gold-light); transform: translateY(-2px); }

  /* ── PARTICIPANT / LANDING VIEW ── */
  #participant-view {
    display: none;
    min-height: 100vh;
    padding: 0;
  }

  .participant-hero {
    padding: 60px 24px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute; inset: 0;
    opacity: 0.06;
    background-image: radial-gradient(circle at 30% 50%, white 1px, transparent 1px),
                      radial-gradient(circle at 70% 20%, white 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .participant-hero .group-number {
    display: inline-block;
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    font-weight: 900;
    line-height: 1;
    color: white;
    margin-bottom: 8px;
    position: relative;
  }

  .participant-hero h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: rgba(255,255,255,0.85);
    font-weight: 700;
    margin-bottom: 8px;
    position: relative;
  }

  .participant-hero p {
    color: rgba(255,255,255,0.6);
    font-size: 0.9rem;
    position: relative;
  }

  .participant-content {
    background: var(--cream);
    border-radius: 28px 28px 0 0;
    margin-top: -20px;
    padding: 36px 24px 60px;
    min-height: 60vh;
    color: var(--deep);
    position: relative;
  }

  .participant-content h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--muted);
    margin-bottom: 20px;
    text-align: center;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-size: 0.75rem;
  }

  .mini-group-cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 420px;
    margin: 0 auto;
  }

  .mini-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 22px;
    border-radius: 16px;
    border: 2px solid;
    text-decoration: none;
    color: var(--deep);
    background: white;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .mini-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
  }

  .mini-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }

  .mini-card:active { transform: scale(0.98); }

  .mini-card-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 900;
    color: white;
    flex-shrink: 0;
  }

  .mini-card-text strong {
    display: block;
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 3px;
  }

  .mini-card-text span {
    font-size: 0.8rem;
    color: var(--muted);
  }

  .mini-card-arrow {
    margin-left: auto;
    font-size: 1.2rem;
    color: var(--muted);
    transition: transform 0.2s ease;
  }

  .mini-card:hover .mini-card-arrow { transform: translateX(4px); }

  .participant-footer {
    text-align: center;
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid rgba(0,0,0,0.08);
    font-size: 0.8rem;
    color: var(--muted);
  }

  /* ── PRINT STYLES ── */
  @media print {
    body { background: white !important; }
    #admin-view { padding: 0; }
    .admin-header, .print-btn { display: none; }
    .qr-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .qr-card { break-inside: avoid; border: 2px solid #ddd; background: white !important; color: black !important; box-shadow: none; }
    .qr-card-header h2, .qr-card-header small { color: black !important; }
    .print-instructions { display: block !important; }
  }

  .print-instructions {
    display: none;
    text-align: center;
    font-size: 0.7rem;
    color: #888;
    margin-top: 8px;
  }
</style>
</head>
<body>

<!-- ══ ADMIN VIEW (default) ══ -->
<div id="admin-view">
  <div class="admin-header">
    <h1>Workshop QR Codes</h1>
    <div class="divider"></div>
    <p>Print each card and place at the corresponding group's table. Participants scan → tap their mini-team → open their doc.</p>
  </div>

  <div class="qr-grid" id="qr-grid"></div>

  <button class="print-btn" onclick="window.print()">🖨 Print All QR Cards</button>
</div>

<!-- ══ PARTICIPANT VIEW (shown when ?group=N in URL) ══ -->
<div id="participant-view">
  <div class="participant-hero" id="participant-hero">
    <div class="hero-bg"></div>
    <div class="group-number" id="hero-number"></div>
    <h2 id="hero-title"></h2>
    <p>Tap your mini-team to open your document</p>
  </div>
  <div class="participant-content">
    <h3>Choose your mini-team</h3>
    <div class="mini-group-cards" id="mini-group-cards"></div>
    <div class="participant-footer">Workshop Navigator · If you're unsure which mini-team you're in, ask your facilitator.</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  DATA — 6 groups, each with 3 mini-teams
//  Each mini-team links to a specific Google Doc
//  Docs have named anchor tabs via heading IDs
// ══════════════════════════════════════════════
const GROUPS = [
  {
    id: 1,
    name: "Group 1",
    color: "#2C5F8A",
    miniTeams: [
      { label: "Mini-Team A", url: "https://docs.google.com/document/d/1BS35lqbZPqAB9LB08_VPB54LjgxtXVZFBw2jls6fCCI/edit#heading=h.mini1" },
      { label: "Mini-Team B", url: "https://docs.google.com/document/d/1BS35lqbZPqAB9LB08_VPB54LjgxtXVZFBw2jls6fCCI/edit#heading=h.mini2" },
      { label: "Mini-Team C", url: "https://docs.google.com/document/d/1BS35lqbZPqAB9LB08_VPB54LjgxtXVZFBw2jls6fCCI/edit#heading=h.mini3" },
    ]
  },
  {
    id: 2,
    name: "Group 2",
    color: "#4A7A35",
    miniTeams: [
      { label: "Mini-Team A", url: "https://docs.google.com/document/d/1b0yZtdXfGooT0eJDR3ffRU7mH25rNX0dXcloWe2ImS8/edit#heading=h.mini1" },
      { label: "Mini-Team B", url: "https://docs.google.com/document/d/1b0yZtdXfGooT0eJDR3ffRU7mH25rNX0dXcloWe2ImS8/edit#heading=h.mini2" },
      { label: "Mini-Team C", url: "https://docs.google.com/document/d/1b0yZtdXfGooT0eJDR3ffRU7mH25rNX0dXcloWe2ImS8/edit#heading=h.mini3" },
    ]
  },
  {
    id: 3,
    name: "Group 3",
    color: "#8A2C5A",
    miniTeams: [
      { label: "Mini-Team A", url: "https://docs.google.com/document/d/1pdYRvlRPvXEdHeoc_OaWstXGMhYy7uln6lLL3M59xks/edit#heading=h.mini1" },
      { label: "Mini-Team B", url: "https://docs.google.com/document/d/1pdYRvlRPvXEdHeoc_OaWstXGMhYy7uln6lLL3M59xks/edit#heading=h.mini2" },
      { label: "Mini-Team C", url: "https://docs.google.com/document/d/1pdYRvlRPvXEdHeoc_OaWstXGMhYy7uln6lLL3M59xks/edit#heading=h.mini3" },
    ]
  },
  {
    id: 4,
    name: "Group 4",
    color: "#8A5A2C",
    miniTeams: [
      { label: "Mini-Team A", url: "https://docs.google.com/document/d/1ZBNp_4LJ8HcwnC6jSJqxLpiy8OgfrrubtCCYJSoEe2Y/edit#heading=h.mini1" },
      { label: "Mini-Team B", url: "https://docs.google.com/document/d/1ZBNp_4LJ8HcwnC6jSJqxLpiy8OgfrrubtCCYJSoEe2Y/edit#heading=h.mini2" },
      { label: "Mini-Team C", url: "https://docs.google.com/document/d/1ZBNp_4LJ8HcwnC6jSJqxLpiy8OgfrrubtCCYJSoEe2Y/edit#heading=h.mini3" },
    ]
  },
  {
    id: 5,
    name: "Group 5",
    color: "#5A2C8A",
    miniTeams: [
      { label: "Mini-Team A", url: "https://docs.google.com/document/d/1qpaGNZQShWaVf7puNy6m-O_qubQ3LlGQbtxa7Dlyo-I/edit#heading=h.mini1" },
      { label: "Mini-Team B", url: "https://docs.google.com/document/d/1qpaGNZQShWaVf7puNy6m-O_qubQ3LlGQbtxa7Dlyo-I/edit#heading=h.mini2" },
      { label: "Mini-Team C", url: "https://docs.google.com/document/d/1qpaGNZQShWaVf7puNy6m-O_qubQ3LlGQbtxa7Dlyo-I/edit#heading=h.mini3" },
    ]
  },
  {
    id: 6,
    name: "Group 6",
    color: "#2C8A7A",
    miniTeams: [
      { label: "Mini-Team A", url: "https://docs.google.com/document/d/1QwCxTMeAxYmo7KqRQFqTGO2AMhEZRtCtTi3TVkTiT_8/edit#heading=h.mini1" },
      { label: "Mini-Team B", url: "https://docs.google.com/document/d/1QwCxTMeAxYmo7KqRQFqTGO2AMhEZRtCtTi3TVkTiT_8/edit#heading=h.mini2" },
      { label: "Mini-Team C", url: "https://docs.google.com/document/d/1QwCxTMeAxYmo7KqRQFqTGO2AMhEZRtCtTi3TVkTiT_8/edit#heading=h.mini3" },
    ]
  }
];

// ══ ROUTING — check URL params ══
const params = new URLSearchParams(window.location.search);
const groupParam = parseInt(params.get('group'));

if (groupParam >= 1 && groupParam <= 6) {
  showParticipantView(groupParam);
} else {
  showAdminView();
}

// ══ ADMIN VIEW ══
function showAdminView() {
  document.getElementById('admin-view').style.display = 'block';
  document.getElementById('participant-view').style.display = 'none';

  const grid = document.getElementById('qr-grid');

  GROUPS.forEach(group => {
    // Build the URL this QR code should point to
    const landingUrl = `${window.location.href.split('?')[0]}?group=${group.id}`;

    const card = document.createElement('div');
    card.className = 'qr-card';
    card.innerHTML = `
      <div class="qr-card-header">
        <div class="group-badge" style="background:${group.color}">${group.id}</div>
        <div>
          <h2>${group.name}</h2>
          <small>Place this QR code at Table ${group.id}</small>
        </div>
      </div>
      <div class="qr-area">
        <div class="qr-box" id="qr-${group.id}"></div>
        <div class="mini-links">
          ${group.miniTeams.map((mt, i) => `
            <a href="${mt.url}" target="_blank" class="mini-link-btn"
               style="border-color:${group.color}; color:${group.color}">
              <span class="mini-dot" style="background:${group.color}"></span>
              ${mt.label}
              <span style="margin-left:auto; font-size:0.75rem; opacity:0.6">↗ Open tab</span>
            </a>
          `).join('')}
        </div>
        <p class="print-instructions">Scan to go to Group ${group.id} landing page</p>
      </div>
    `;
    grid.appendChild(card);

    // Generate QR code
    setTimeout(() => {
      new QRCode(document.getElementById(`qr-${group.id}`), {
        text: landingUrl,
        width: 180,
        height: 180,
        colorDark: "#1A1209",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    }, 100);
  });
}

// ══ PARTICIPANT VIEW ══
function showParticipantView(groupId) {
  document.getElementById('admin-view').style.display = 'none';
  const pv = document.getElementById('participant-view');
  pv.style.display = 'block';

  const group = GROUPS[groupId - 1];

  // Hero styling
  const hero = document.getElementById('participant-hero');
  hero.style.background = `linear-gradient(135deg, ${group.color} 0%, ${darken(group.color, 30)} 100%)`;

  document.getElementById('hero-number').textContent = groupId;
  document.getElementById('hero-title').textContent = group.name;
  document.title = `${group.name} — Workshop`;

  // Mini-team cards
  const container = document.getElementById('mini-group-cards');
  const letters = ['A', 'B', 'C'];

  group.miniTeams.forEach((mt, i) => {
    const card = document.createElement('a');
    card.href = mt.url;
    card.target = '_blank';
    card.className = 'mini-card';
    card.style.borderColor = `${group.color}30`;
    card.innerHTML = `
      <div class="mini-card::before" style="background:${group.color}"></div>
      <div class="mini-card-icon" style="background:${group.color}">${letters[i]}</div>
      <div class="mini-card-text">
        <strong>${mt.label}</strong>
        <span>Tap to open your document</span>
      </div>
      <div class="mini-card-arrow">→</div>
    `;
    // Apply left accent bar via JS since ::before can't be set inline
    card.style.borderLeft = `5px solid ${group.color}`;
    container.appendChild(card);
  });
}

function darken(hex, amount) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, r - amount);
  g = Math.max(0, g - amount);
  b = Math.max(0, b - amount);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}
</script>
</body>
</html>
